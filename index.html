<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bus - Aurora Edition</title>
    <style>
        /* 1. CONFIGURACIÓN BASE Y FONDO */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centrado horizontal */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #ffffff;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #1e293b);
            background-size: 400% 400%;
            animation: auroraBackground 20s ease infinite;
            overflow-x: hidden; /* Evita scroll lateral molesto */
        }

        @keyframes auroraBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fondo-textos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .mensaje-flotante {
            position: absolute;
            white-space: nowrap;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03); 
            user-select: none;
            animation: moverTexto linear infinite;
        }

        @keyframes moverTexto {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* 2. ESTRUCTURA DASHBOARD */
        .reloj-global {
            font-size: 2.5em;
            color: rgba(255, 255, 255, 0.8);
            margin: 20px 0 30px 0;
            font-family: monospace;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
        }

        .contenedor-tarjetas {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 100px; /* Espacio para que el botón no tape la info */
        }

        .tarjeta {
            background-color: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .parada {
            font-size: 1em;
            color: #b3b3b3;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* 3. LÍNEAS Y TIEMPOS */
        .linea {
            font-size: 2.2em;
            font-weight: bold;
            color: #ffffff;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .linea-tmb { background-color: #2b70f0; box-shadow: 0 4px 15px rgba(43, 112, 240, 0.4); }
        .linea-amb { background-color: #ff5100; box-shadow: 0 4px 15px rgba(230, 126, 57, 0.4); }

        .tiempo {
            font-size: 3em;
            font-weight: bold;
            color: #4caf50;
            min-height: 1.2em;
        }

        .minutos-texto {
            font-size: 0.4em;
            color: #888;
            display: block;
            text-transform: uppercase;
        }

        .progreso-container {
            width: 100%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progreso-barra {
            height: 100%;
            width: 0%;
            background-color: #4caf50;
            transition: width 1s ease-in-out;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .alerta-roja { animation: parpadeo 1s infinite; }

        /* 4. BOTONES */
        button {
            padding: 15px 35px;
            font-size: 1em;
            color: white;
            background-color: rgba(43, 112, 240, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 100;
        }

        /* 📱 ADAPTACIÓN PARA MÓVIL (CORREGIDO) */
        @media (max-width: 600px) {
            .reloj-global { font-size: 1.8em; margin: 10px 0; }
            .contenedor-tarjetas { gap: 15px; }
            .tarjeta { padding: 20px; }
            .tiempo { font-size: 2.5em; }
            
            button {
                position: fixed;
                bottom: 25px;
                left: 50%;
                transform: translateX(-50%);
                width: 85%;
                box-shadow: 0 10px 30px rgba(0,0,0,0.6);
                backdrop-filter: blur(10px);
            }
        }

        .modo-ahora { animation: arcoiris 1.5s linear infinite; }
        @keyframes arcoiris {
            0% { color: #ff5252; } 33% { color: #ffeb3b; } 66% { color: #4caf50; } 100% { color: #ff5252; }
        }
    </style>
</head>
<body>

    <div id="fondo-textos" class="fondo-textos"></div>
    <div id="reloj" class="reloj-global">00:00:00</div>

    <div class="contenedor-tarjetas">
        <div class="tarjeta">
            <div class="parada">📍 C. Bell-lloc - Berlín (3521)</div>
            <div class="bloque-bus">
                <div class="linea linea-tmb">V5</div>
                <div class="tiempo" id="tiempo-v5">--</div>
                <div class="progreso-container">
                    <div id="barra-v5" class="progreso-barra"></div>
                </div>
                <div class="proximo" id="siguiente-v5">Consultando...</div>
            </div>
        </div>

        <div class="tarjeta">
            <div class="parada">📍 Pl. Reina Maria Cristina (237)</div>
            <div class="bloque-bus">
                <div class="linea linea-amb">X30</div>
                <div class="tiempo" id="tiempo-x30">--</div>
                <div class="progreso-container">
                    <div id="barra-x30" class="progreso-barra"></div>
                </div>
                <div class="proximo" id="siguiente-x30">Conectando...</div>
            </div>
            <div class="proximo" id="info-amb" style="font-size: 0.7em; margin-top: 15px; opacity: 0.6;"></div>
        </div>
    </div>

    <button onclick="actualizarTodaLaRed()">Actualizar Red</button>

    <script>
        // Tus funciones de JS se mantienen igual porque funcionaban perfecto
        const APP_ID = "05f36d2d"; 
        const APP_KEY = "7337db37d02d34777f38d728ce1c1903"; 
        const PARADA_TMB = "3521"; 

        function actualizarInterfazBus(minutos, idTiempo, idBarra) {
            const tiempoEl = document.getElementById(idTiempo);
            const barraEl = document.getElementById(idBarra);

            if (minutos === null || minutos === undefined) {
                tiempoEl.innerHTML = "--";
                barraEl.style.width = "0%";
                return;
            }

            let porcentaje = Math.max(0, 100 - (minutos * 6.6)); // Ajustado para 15 mins max
            barraEl.style.width = porcentaje + "%";
            
            if (minutos <= 3) {
                barraEl.style.backgroundColor = "#ff5252"; 
                barraEl.classList.add("alerta-roja"); 
            } else {
                barraEl.style.backgroundColor = "#4caf50"; 
                barraEl.classList.remove("alerta-roja"); 
            }

            if (minutos === 0) {
                tiempoEl.innerHTML = "¡Ahora!";
                tiempoEl.classList.add("modo-ahora");
            } else {
                tiempoEl.innerHTML = minutos + '<span class="minutos-texto">minutos</span>';
                tiempoEl.classList.remove("modo-ahora");
            }
        }

        async function obtenerTMB() {
            try {
                const url = `https://api.tmb.cat/v1/ibus/stops/${PARADA_TMB}?app_id=${APP_ID}&app_key=${APP_KEY}`;
                const respuesta = await fetch(url);
                const datos = await respuesta.json();
                if (datos.data && datos.data.ibus) {
                    const busV5 = datos.data.ibus.find(bus => bus.line === "V5");
                    if (busV5) {
                        actualizarInterfazBus(busV5["t-in-min"], 'tiempo-v5', 'barra-v5');
                        document.getElementById('siguiente-v5').innerText = "Bus en trayecto";
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function obtenerAMB() {
            try {
                const respuesta = await fetch("https://mi-bus.onrender.com/api/amb");
                const datos = await respuesta.json();
                if (datos.status === "ok" && datos.buses.length > 0) {
                    const busX30 = datos.buses.find(b => b.linea.includes("X30"));
                    if (busX30) {
                        actualizarInterfazBus(busX30.minutos, 'tiempo-x30', 'barra-x30');
                        document.getElementById('siguiente-x30').innerText = "Red AMB Activa";
                        document.getElementById('info-amb').innerText = "Servidor Online ✅";
                    }
                }
            } catch (e) { 
                document.getElementById('info-amb').innerText = "⚠️ Error Servidor";
            }
        }

        function actualizarTodaLaRed() {
            obtenerTMB();
            obtenerAMB();
        }

        function actualizarReloj() {
            document.getElementById('reloj').textContent = new Date().toLocaleTimeString();
        }

        function crearFondo() {
            const fondo = document.getElementById('fondo-textos');
            for (let i = 0; i < 10; i++) {
                const span = document.createElement('span');
                span.className = 'mensaje-flotante';
                span.innerText = 'MI BUS '.repeat(5);
                span.style.top = (Math.random() * 100) + 'vh';
                span.style.fontSize = (Math.random() * 2 + 1) + 'em';
                span.style.animationDuration = (Math.random() * 20 + 20) + 's';
                span.style.animationDelay = (Math.random() * -20) + 's';
                fondo.appendChild(span);
            }
        }

        window.onload = () => {
            crearFondo();
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
            actualizarTodaLaRed();
            setInterval(actualizarTodaLaRed, 30000);
        };
    </script>
</body>
</html>
