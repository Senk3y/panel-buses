<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bus - Aurora Edition</title>
    
    <link rel="icon" type="image/png" href="icono_bus.png">
    <link rel="apple-touch-icon" href="icono_bus.png">
    <meta name="theme-color" content="#0f172a">

    <style>
        /* 1. CONFIGURACIÓN BASE Y FONDO */
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #ffffff;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #1e293b);
            background-size: 400% 400%;
            animation: auroraBackground 20s ease infinite;
            overflow-x: hidden;
        }

        @keyframes auroraBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fondo-textos {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .mensaje-flotante {
            position: absolute;
            white-space: nowrap;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03); 
            user-select: none;
            animation: moverTexto linear infinite;
        }

        @keyframes moverTexto {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* 2. RELOJ GLOBAL */
        .reloj-global {
            font-size: 2.5em;
            color: rgba(255, 255, 255, 0.9);
            margin: 10px 0 20px 0;
            font-family: monospace;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
        }

        /* 3. ESTRUCTURA DE NAVEGACIÓN */
        .seccion-app {
            width: 100%;
            max-width: 500px;
            display: none; 
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 4. MENÚ PRINCIPAL */
        .lista-menu {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .item-menu {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .item-menu:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.15); }
        .texto-item { flex-grow: 1; display: flex; flex-direction: column; margin-left: 15px; }
        .nombre-parada { font-weight: bold; font-size: 1.1em; color: #fff; }
        .lineas-badge { font-size: 0.8em; margin-top: 4px; font-weight: bold; text-transform: uppercase; }

        /* Colores del menú */
        .badge-v5 { color: #4facfe; }
        .badge-x30 { color: #ff5100; }
        .badge-l52 { color: #ffb703; }

        /* 5. TARJETAS Y DETALLES */
        .tarjeta {
            background-color: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .linea {
            font-size: 2.5em; font-weight: bold; padding: 5px 25px;
            border-radius: 12px; margin-bottom: 15px; display: inline-block;
        }
        .linea-tmb { background-color: #2b70f0; }
        .linea-amb { background-color: #ff5100; }
        .linea-l52 { background-color: #ffb703; color: #000; } /* Letra negra para que contraste bien con el amarillo/naranja */

        .tiempo { font-size: 3.5em; font-weight: bold; color: #4caf50; }
        .minutos-texto { font-size: 0.4em; color: #888; display: block; }

        .progreso-container {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 20px 0; overflow: hidden;
        }
        .progreso-barra { height: 100%; width: 0%; background: #4caf50; transition: width 1s; }

        /* 6. BOTONES */
        .btn-volver {
            align-self: flex-start; background: none; border: none;
            color: #aaa; cursor: pointer; font-size: 1.1em; margin-bottom: 15px;
        }

        button.btn-accion {
            padding: 15px 35px; font-size: 1em; color: white;
            border: none; border-radius: 50px;
            font-weight: bold; text-transform: uppercase; width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        button.btn-accion:disabled { background: #555 !important; color: #ccc !important; cursor: not-allowed; }

        @media (max-width: 600px) {
            .reloj-global { font-size: 2em; margin-top: 0; }
            button.btn-accion { position: fixed; bottom: 25px; left: 5%; width: 90%; }
        }

        .alerta-roja { animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .modo-ahora { animation: arcoiris 1.5s linear infinite; }
        @keyframes arcoiris { 0% { color: #ff5252; } 33% { color: #ffeb3b; } 66% { color: #4caf50; } 100% { color: #ff5252; } }
    </style>
</head>
<body>

    <div id="fondo-textos" class="fondo-textos"></div>
    <div id="reloj" class="reloj-global">00:00:00</div>

    <div id="vista-menu" class="seccion-app" style="display: flex;">
        <h3 style="margin: 0; opacity: 0.6; font-weight: normal; align-self: flex-start; margin-left: 5px;">MIS PARADAS</h3>
        
        <div class="lista-menu">
            <div class="item-menu" onclick="navegarA('parada-v5')">
                <span style="font-size: 1.5em;">📍</span>
                <div class="texto-item">
                    <span class="nombre-parada">C. Bell-lloc - Berlín</span>
                    <span class="lineas-badge badge-v5">Línea V5</span>
                </div>
                <span style="opacity: 0.3;">❯</span>
            </div>

            <div class="item-menu" onclick="navegarA('parada-x30')">
                <span style="font-size: 1.5em;">📍</span>
                <div class="texto-item">
                    <span class="nombre-parada">Pl. Reina Maria Cristina</span>
                    <span class="lineas-badge badge-x30">Línea X30</span>
                </div>
                <span style="opacity: 0.3;">❯</span>
            </div>

            <div class="item-menu" onclick="navegarA('parada-l52')">
                <span style="font-size: 1.5em;">📍</span>
                <div class="texto-item">
                    <span class="nombre-parada">Major - Mercat</span>
                    <span class="lineas-badge badge-l52">Línea L52</span>
                </div>
                <span style="opacity: 0.3;">❯</span>
            </div>
        </div>
    </div>

    <div id="parada-v5" class="seccion-app">
        <button class="btn-volver" onclick="irAlMenu()">❮ Menú Principal</button>
        <div class="tarjeta">
            <div style="font-size: 0.9em; opacity: 0.5; margin-bottom: 10px;">PARADA 3521</div>
            <div class="linea linea-tmb">V5</div>
            <div class="tiempo" id="tiempo-v5">--</div>
            <div class="progreso-container"><div id="barra-v5" class="progreso-barra"></div></div>
            <div id="siguiente-v5" style="opacity: 0.7;">Consultando TMB...</div>
        </div>
        <button id="btn-v5" class="btn-accion" style="background-color: #2b70f0;" onclick="forzarActualizacion('v5')">Actualizar Ahora</button>
    </div>

    <div id="parada-x30" class="seccion-app">
        <button class="btn-volver" onclick="irAlMenu()">❮ Menú Principal</button>
        <div class="tarjeta">
            <div style="font-size: 0.9em; opacity: 0.5; margin-bottom: 10px;">PARADA 237</div>
            <div class="linea linea-amb">X30</div>
            <div class="tiempo" id="tiempo-x30">--</div>
            <div class="progreso-container"><div id="barra-x30" class="progreso-barra"></div></div>
            <div id="siguiente-x30" style="opacity: 0.7;">Conectando AMB...</div>
            <div id="info-amb" style="font-size: 0.7em; margin-top: 15px; opacity: 0.4;"></div>
        </div>
        <button id="btn-x30" class="btn-accion" style="background-color: #ff5100;" onclick="forzarActualizacion('x30')">Actualizar Ahora</button>
    </div>

    <div id="parada-l52" class="seccion-app">
        <button class="btn-volver" onclick="irAlMenu()">❮ Menú Principal</button>
        <div class="tarjeta">
            <div style="font-size: 0.9em; opacity: 0.5; margin-bottom: 10px;">PARADA 002275</div>
            <div class="linea linea-l52">L52</div>
            <div class="tiempo" id="tiempo-l52">--</div>
            <div class="progreso-container"><div id="barra-l52" class="progreso-barra"></div></div>
            <div id="siguiente-l52" style="opacity: 0.7;">Conectando Servidor...</div>
            <div id="info-l52" style="font-size: 0.7em; margin-top: 15px; opacity: 0.4;"></div>
        </div>
        <button id="btn-l52" class="btn-accion" style="background-color: #ffb703; color: #000;" onclick="forzarActualizacion('l52')">Actualizar Ahora</button>
    </div>

    <script>
        const APP_ID = "05f36d2d"; 
        const APP_KEY = "7337db37d02d34777f38d728ce1c1903"; 
        const PARADA_TMB = "3521"; 

        // NAVEGACIÓN
        function navegarA(id) {
            document.querySelectorAll('.seccion-app').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 'parada-v5') obtenerTMB();
            if(id === 'parada-x30') obtenerAMB();
            if(id === 'parada-l52') obtenerL52();
        }

        function irAlMenu() {
            document.querySelectorAll('.seccion-app').forEach(s => s.style.display = 'none');
            document.getElementById('vista-menu').style.display = 'flex';
        }

        // LÓGICA DE INTERFAZ
        function actualizarInterfazBus(minutos, idTiempo, idBarra) {
            const tiempoEl = document.getElementById(idTiempo);
            const barraEl = document.getElementById(idBarra);
            if (minutos === null || minutos === undefined) {
                tiempoEl.innerHTML = "--";
                barraEl.style.width = "0%";
                return;
            }
            let porcentaje = Math.max(0, 100 - (minutos * 6.6));
            barraEl.style.width = porcentaje + "%";
            barraEl.style.backgroundColor = minutos <= 3 ? "#ff5252" : "#4caf50";
            if (minutos <= 3) barraEl.classList.add("alerta-roja"); else barraEl.classList.remove("alerta-roja");
            
            if (minutos === 0) {
                tiempoEl.innerHTML = "¡Ahora!";
                tiempoEl.classList.add("modo-ahora");
            } else {
                tiempoEl.innerHTML = minutos + '<span class="minutos-texto">minutos</span>';
                tiempoEl.classList.remove("modo-ahora");
            }
        }

        // PETICIÓN V5 (TMB)
        async function obtenerTMB() {
            try {
                const url = `https://api.tmb.cat/v1/ibus/stops/${PARADA_TMB}?app_id=${APP_ID}&app_key=${APP_KEY}`;
                const res = await fetch(url);
                const datos = await res.json();
                const busV5 = datos.data?.ibus.find(b => b.line === "V5");
                if (busV5) {
                    actualizarInterfazBus(busV5["t-in-min"], 'tiempo-v5', 'barra-v5');
                    document.getElementById('siguiente-v5').innerText = "Información en tiempo real";
                } else {
                    actualizarInterfazBus(null, 'tiempo-v5', 'barra-v5');
                    document.getElementById('siguiente-v5').innerText = "Sin buses a la vista";
                }
            } catch (e) { document.getElementById('siguiente-v5').innerText = "Error TMB"; }
        }

        // PETICIÓN X30 (AMB - Proxy)
        async function obtenerAMB() {
            try {
                // Suponemos que tu servidor proxy acepta el parámetro 'parada'
                const res = await fetch("https://mi-bus.onrender.com/api/amb?parada=237");
                const datos = await res.json();
                if (datos.status === "ok") {
                    const busX30 = datos.buses.find(b => b.linea.includes("X30"));
                    if (busX30) {
                        actualizarInterfazBus(busX30.minutos, 'tiempo-x30', 'barra-x30');
                        document.getElementById('info-amb').innerText = "Servidor Online ✅";
                    } else {
                        actualizarInterfazBus(null, 'tiempo-x30', 'barra-x30');
                        document.getElementById('siguiente-x30').innerText = "Sin buses a la vista";
                    }
                }
            } catch (e) { document.getElementById('info-amb').innerText = "⚠️ Error Servidor"; }
        }

        // PETICIÓN L52 (AMB - Modo Espía)
        async function obtenerL52() {
            try {
                const res = await fetch("https://mi-bus.onrender.com/api/amb?parada=002275");
                const datos = await res.json();
                
                if (datos.status === "ok") {
                    if (datos.buses.length > 0) {
                        // Cogemos el primer bus que llegue para mover la barra de tiempo
                        const busPrincipal = datos.buses[0];
                        actualizarInterfazBus(busPrincipal.minutos, 'tiempo-l52', 'barra-l52');
                        
                        // MAGIA: Mostramos TODOS los códigos que llegan a esta parada
                        const codigos = datos.buses.map(b => `${b.linea} (${b.minutos}m)`).join(" | ");
                        document.getElementById('siguiente-l52').innerHTML = `<span style="color:#ffeb3b;">Códigos detectados: <strong>${codigos}</strong></span>`;
                        document.getElementById('info-l52').innerText = "Servidor Online ✅";
                    } else {
                        actualizarInterfazBus(null, 'tiempo-l52', 'barra-l52');
                        document.getElementById('siguiente-l52').innerText = "Sin buses a la vista (o código erróneo)";
                    }
                }
            } catch (e) { document.getElementById('info-l52').innerText = "⚠️ Error Servidor"; }
        }

        // BOTONES DE ACTUALIZAR
        async function forzarActualizacion(linea) {
            const btn = document.getElementById(`btn-${linea}`);
            const textoOriginal = btn.innerText;
            btn.innerText = "Actualizando...";
            btn.disabled = true;

            if(linea === 'v5') await obtenerTMB();
            if(linea === 'x30') await obtenerAMB();
            if(linea === 'l52') await obtenerL52();
            
            setTimeout(() => {
                btn.innerText = textoOriginal;
                btn.disabled = false;
            }, 800);
        }

        function actualizarReloj() {
            document.getElementById('reloj').textContent = new Date().toLocaleTimeString();
        }

        function crearFondo() {
            const fondo = document.getElementById('fondo-textos');
            for (let i = 0; i < 12; i++) {
                const span = document.createElement('span');
                span.className = 'mensaje-flotante';
                span.innerText = 'MI BUS '.repeat(4);
                span.style.top = (Math.random() * 100) + 'vh';
                span.style.fontSize = (Math.random() * 2 + 1) + 'em';
                span.style.animationDuration = (Math.random() * 20 + 20) + 's';
                span.style.animationDelay = (Math.random() * -20) + 's';
                fondo.appendChild(span);
            }
        }

        window.onload = () => {
            crearFondo();
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
            
            setInterval(() => {
                obtenerTMB();
                obtenerAMB();
                obtenerL52();
            }, 30000);
        };
    </script>
</body>
</html>
