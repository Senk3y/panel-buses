<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bus</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icono_bus.png">
    <link rel="apple-touch-icon" href="icono_bus.png">
    <meta name="theme-color" content="#020617">

    <style>
        /* ESTILO 80s SYNTHWAVE */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; color: #ffffff; 
            background-color: #020617; /* Fondo oscuro base */
            overflow-x: hidden; position: relative; 
        }

        .reloj-global { 
    font-size: 2.2em; /* Un pelín más pequeño para que sea estético */
    color: #FF00FF; 
    margin: 15px auto 25px auto; 
    padding: 10px 35px;
    font-family: 'Courier New', Courier, monospace; 
    letter-spacing: 3px; 
    text-shadow: 0 0 15px #FF00FF; 
    
    /* DISEÑO TIPO CÁPSULA (Floating Badge) */
    background: rgba(15, 23, 42, 0.7); /* Fondo oscuro coherente con las tarjetas */
    backdrop-filter: blur(12px);     /* El efecto cristal que buscamos */
    -webkit-backdrop-filter: blur(12px);
    border: 2px solid rgba(255, 0, 255, 0.4); /* Borde de neón fino */
    border-radius: 50px;             /* Forma de cápsula/pastilla */
    
    /* POSICIONAMIENTO */
    display: inline-block;           /* Solo ocupa lo que mide el texto */
    position: sticky; 
    top: 15px;
    z-index: 999; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 15px rgba(255,0,255,0.1);
}

        .seccion-app { 
            width: 100%; max-width: 500px; display: none; flex-direction: column; 
            align-items: center; animation: fadeIn 0.4s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .lista-menu { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .item-menu { 
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 15px 20px; border-radius: 22px; display: flex; align-items: center; 
            transition: all 0.3s; backdrop-filter: blur(12px); position: relative; 
        }
        .item-menu-click { flex-grow: 1; display: flex; align-items: center; cursor: pointer; }
        .item-menu:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }
        .texto-item { flex-grow: 1; display: flex; flex-direction: column; margin-left: 15px; }
        .nombre-parada { font-weight: bold; font-size: 1.1em; color: #fff; }
        .lineas-badge { font-size: 0.8em; margin-top: 4px; font-weight: bold; text-transform: uppercase; color: #22d3ee; }

        .btn-borrar { background: none; border: none; color: #ef4444; font-size: 1.2em; cursor: pointer; padding: 10px; opacity: 0.6; transition: 0.3s; }
        .btn-borrar:hover { opacity: 1; transform: scale(1.1); }

        .tarjeta { 
            background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); 
            padding: 30px; border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            text-align: center; width: 100%; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; 
        }
        .linea { 
            font-size: 2.2em; font-weight: 900; padding: 8px 30px; border-radius: 15px; 
            margin-bottom: 15px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            background: linear-gradient(99deg, #FF00FF 0%, #00FFFF 100%); 
        }
        
        .tiempo { 
            font-size: 4em; font-weight: 900; color: #00FF00; 
            text-shadow: 0 0 20px #00FF00, 0 0 40px rgba(0,255,0,0.5); transition: all 0.3s; 
        }
        .minutos-texto { font-size: 0.4em; color: #94a3b8; display: block; text-transform: uppercase; letter-spacing: 2px; }
        .brillo-carga { animation: pulseCarga 0.8s infinite alternate; color: #64748b !important; text-shadow: none !important; }
        @keyframes pulseCarga { from { opacity: 0.3; } to { opacity: 0.8; } }

        .progreso-container { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; margin: 25px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progreso-barra { height: 100%; width: 0%; background: #4ade80; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .estado-bus { height: 20px; opacity: 0.9; font-size: 0.95em; margin-bottom: 5px; color: #cbd5e1; font-weight: bold;}
        .estado-servidor { height: 15px; font-size: 0.7em; margin-top: 10px; opacity: 0.4; }

        .btn-volver { align-self: flex-start; background: rgba(255,255,255,0.1); border: none; color: #fff; cursor: pointer; font-size: 0.9em; padding: 8px 15px; border-radius: 10px; margin-bottom: 15px; }
        
        button.btn-accion { 
            width: 100%; padding: 15px; border: none; border-radius: 15px; color: white; 
            font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all 0.3s; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            background: linear-gradient(99deg, #FF00FF 0%, #00FFFF 100%); 
        } 
        button.btn-accion:active { transform: translateY(3px); }
        button.btn-accion:disabled { opacity: 0.5; filter: grayscale(1); }

        /* FORMULARIO AÑADIR PARADA */
        .formulario { display: flex; flex-direction: column; gap: 15px; width: 100%; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .formulario input, .formulario select { padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1em; }
        .formulario input::placeholder { color: rgba(255,255,255,0.5); }
        .formulario label { font-size: 0.8em; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: -10px; }

        .alerta-roja { animation: flashRed 1s infinite; }
        @keyframes flashRed { 0%, 100% { background-color: #ef4444; } 50% { background-color: #7f1d1d; } }
        .modo-ahora { animation: rainbowText 2s linear infinite; }
        @keyframes rainbowText { 0% { color: #f87171; } 33% { color: #fbbf24; } 66% { color: #34d399; } 100% { color: #f87171; } }
    </style>
</head>
<body>

    <div id="fondo-textos" class="fondo-textos"></div>
    <div id="reloj" class="reloj-global">00:00:00</div>

    <div id="vista-menu" class="seccion-app" style="display: flex;">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; opacity: 0.8; font-weight: 800; letter-spacing: 1px;">MIS PARADAS</h3>
            <div style="display: flex; gap: 8px;">
                <button onclick="compartirApp()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; cursor: pointer;">📤 COMPARTIR</button>
                <button onclick="mostrarFormulario()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;">+ AÑADIR</button>
            </div>
        </div>
        
        <div class="lista-menu" id="contenedor-paradas"></div>
    </div>

    <div id="vista-formulario" class="seccion-app">
        <button class="btn-volver" onclick="irAlMenu()">❮ CANCELAR</button>
        <h3 style="align-self: flex-start; margin-top: 0;">NUEVA PARADA</h3>
        <div class="formulario">
            <label>Nombre personalizado (ej. Casa, Trabajo)</label>
            <input type="text" id="input-nombre" placeholder="Mi parada">
            
            <label>Línea (ej. V5, X30)</label>
            <input type="text" id="input-linea" placeholder="V5">
            
            <label>Código de la Parada (ej. 3521)</label>
            <input type="text" id="input-codigo" placeholder="Número de parada">
            
            <label>Red de Autobuses</label>
            <select id="input-red">
                <option value="TMB">TMB (Buses rojos de Barcelona)</option>
                <option value="AMB">AMB (Buses amarillos/metropolitanos)</option>
            </select>
            
            <button class="btn-accion" style="margin-top: 10px;" onclick="guardarParada()">GUARDAR PARADA</button>
        </div>
    </div>

    <div id="vista-detalle" class="seccion-app">
        <button class="btn-volver" onclick="irAlMenu()">❮ VOLVER</button>
        <div class="tarjeta">
            <div id="detalle-codigo" style="font-size: 0.8em; opacity: 0.5; margin-bottom: 10px; letter-spacing: 2px;">CÓDIGO --</div>
            <div id="detalle-linea" class="linea">--</div>
            <div class="tiempo" id="detalle-tiempo">--</div>
            <div class="progreso-container"><div id="detalle-barra" class="progreso-barra"></div></div>
            <div id="detalle-siguiente" class="estado-bus">Esperando conexión...</div>
            <div id="detalle-info" class="estado-servidor"></div>
        </div>
        <button id="btn-actualizar" class="btn-accion" onclick="forzarActualizacion()">ACTUALIZAR DATOS</button>
    </div>

    <script>
        // CONFIGURACIÓN API
        const APP_ID = "05f36d2d"; 
        const APP_KEY = "7337db37d02d34777f38d728ce1c1903"; 

        // ESTADO GLOBAL
        let paradaActiva = null; 
        let timerActualizacion = null;

        // 1. CARGAR PARADAS
        let misParadas = JSON.parse(localStorage.getItem('paradasGuardadas'));
        if (!misParadas || misParadas.length === 0) {
            misParadas = [
                { id: 1, nombre: 'C. Bell-lloc - Berlín', linea: 'V5', codigo: '3521', red: 'TMB' },
                { id: 2, nombre: 'Pl. Reina Maria Cristina', linea: 'X30', codigo: '237', red: 'AMB' },
                { id: 3, nombre: 'Major - Mercat', linea: 'L52', codigo: '002275', red: 'AMB' }
            ];
            guardarEnMemoria();
        }

        // 2. RENDERIZAR MENÚ
        function renderizarMenu() {
            const contenedor = document.getElementById('contenedor-paradas');
            contenedor.innerHTML = ''; 
            
            misParadas.forEach(p => {
                let colorLinea = '#00FFFF'; // Defecto Cyan neón
                if(p.linea.toUpperCase() === 'X30') colorLinea = '#FF4500'; // Naranja brillante
                if(p.linea.toUpperCase() === 'L52') colorLinea = '#FFFF00'; // Amarillo neón

                const div = document.createElement('div');
                div.className = 'item-menu';
                div.innerHTML = `
                    <div class="item-menu-click" onclick="abrirParada(${p.id})">
                        <span style="font-size: 1.8em; filter: drop-shadow(0 0 10px ${colorLinea});">📍</span>
                        <div class="texto-item">
                            <span class="nombre-parada">${p.nombre}</span>
                            <span class="lineas-badge" style="color: ${colorLinea}">Línea ${p.linea} (${p.red})</span>
                        </div>
                    </div>
                    <button class="btn-borrar" onclick="borrarParada(${p.id})">✖</button>
                `;
                contenedor.appendChild(div);
            });
        }

        // 3. NAVEGACIÓN
        function irAlMenu() {
            document.querySelectorAll('.seccion-app').forEach(s => s.style.display = 'none');
            document.getElementById('vista-menu').style.display = 'flex';
            document.body.style.animationDuration = '15s';
            paradaActiva = null;
            if(timerActualizacion) clearInterval(timerActualizacion);
        }

        function mostrarFormulario() {
            document.querySelectorAll('.seccion-app').forEach(s => s.style.display = 'none');
            document.getElementById('vista-formulario').style.display = 'flex';
        }

        function abrirParada(id) {
            paradaActiva = misParadas.find(p => p.id === id);
            
            document.getElementById('detalle-codigo').innerText = `CÓDIGO ${paradaActiva.codigo}`;
            document.getElementById('detalle-linea').innerText = paradaActiva.linea.toUpperCase();
            
            const btn = document.getElementById('btn-actualizar');
            const badge = document.getElementById('detalle-linea');
            
            // Colores específicos para cada red o línea en el degradado
            if (paradaActiva.red === 'TMB') {
                btn.style.background = 'linear-gradient(99deg, #00FFFF 0%, #007BFF 100%)'; // Cyan a Azul
            } else if (paradaActiva.linea.toUpperCase() === 'L52') {
                btn.style.background = 'linear-gradient(99deg, #FFFF00 0%, #FFD700 100%)'; // Amarillo Neón
            } else if (paradaActiva.linea.toUpperCase() === 'X30') {
                btn.style.background = 'linear-gradient(99deg, #FF4500 0%, #FF8C00 100%)'; // Naranja brillante
            } else {
                btn.style.background = 'linear-gradient(99deg, #FF00FF 0%, #FF69B4 100%)'; // Fucsia por defecto para AMB
            }

            badge.style.background = btn.style.background;
            badge.style.color = '#ffffff'; 
            btn.style.color = '#ffffff';
            badge.style.textShadow = '0 1px 3px rgba(0,0,0,0.6)'; // Sombra más oscura para contraste
            btn.style.textShadow = '0 1px 3px rgba(0,0,0,0.6)';

            document.querySelectorAll('.seccion-app').forEach(s => s.style.display = 'none');
            document.getElementById('vista-detalle').style.display = 'flex';
            
            buscarDatosBus();
            
            if(timerActualizacion) clearInterval(timerActualizacion);
            timerActualizacion = setInterval(buscarDatosBus, 30000);
        }

        // 4. LÓGICA DE AÑADIR/BORRAR PARADAS
        function guardarEnMemoria() { localStorage.setItem('paradasGuardadas', JSON.stringify(misParadas)); }

        function guardarParada() {
            const nombre = document.getElementById('input-nombre').value;
            const linea = document.getElementById('input-linea').value;
            const codigo = document.getElementById('input-codigo').value;
            const red = document.getElementById('input-red').value;

            if(!nombre || !linea || !codigo) { alert("¡Rellena todos los campos!"); return; }

            const nuevaParada = { id: Date.now(), nombre, linea: linea.toUpperCase(), codigo, red };
            misParadas.push(nuevaParada);
            guardarEnMemoria();
            
            document.getElementById('input-nombre').value = '';
            document.getElementById('input-linea').value = '';
            document.getElementById('input-codigo').value = '';
            
            renderizarMenu();
            irAlMenu();
        }

        function borrarParada(id) {
            if(confirm("¿Seguro que quieres borrar esta parada?")) {
                misParadas = misParadas.filter(p => p.id !== id);
                guardarEnMemoria();
                renderizarMenu();
            }
        }

        // 5. LÓGICA DE ACTUALIZACIÓN DE DATOS
        function setEstadoCarga() {
            const tiempoEl = document.getElementById('detalle-tiempo');
            tiempoEl.classList.add('brillo-carga');
            tiempoEl.innerHTML = '88'; 
            document.getElementById('detalle-siguiente').innerText = "Buscando en el cosmos...";
        }

        function procesarResultados(min1, min2) {
            const tiempoEl = document.getElementById('detalle-tiempo');
            const barraEl = document.getElementById('detalle-barra');
            const sigEl = document.getElementById('detalle-siguiente');
            
            tiempoEl.classList.remove('brillo-carga');

            if (min1 === null || min1 === undefined) {
                tiempoEl.innerHTML = "--"; barraEl.style.width = "0%";
                sigEl.innerText = "Sin buses próximos";
                document.body.style.animationDuration = '15s';
                return;
            }

            if (min1 <= 3) document.body.style.animationDuration = '3s'; 
            else if (min1 <= 10) document.body.style.animationDuration = '8s'; 
            else document.body.style.animationDuration = '15s'; 

            if (min1 <= 3 && navigator.vibrate) navigator.vibrate([200, 100, 200]); 

            if (min2 !== null && min2 !== undefined) {
                sigEl.innerHTML = `Próximo bus en: <span style="color:#fff;">${min2} min</span>`;
            } else {
                sigEl.innerText = "No hay más buses en cola";
            }

            let porcentaje = Math.max(0, 100 - (min1 * 6.6));
            barraEl.style.width = porcentaje + "%";
            
            if (min1 <= 3) { barraEl.classList.add("alerta-roja"); barraEl.style.backgroundColor = ""; } 
            else { barraEl.classList.remove("alerta-roja"); barraEl.style.backgroundColor = "#00FF00"; }
            
            if (min1 === 0) { tiempoEl.innerHTML = "¡AHORA!"; tiempoEl.classList.add("modo-ahora"); } 
            else { tiempoEl.innerHTML = min1 + '<span class="minutos-texto">minutos</span>'; tiempoEl.classList.remove("modo-ahora"); }
        }

        async function buscarDatosBus() {
            if(!paradaActiva) return;
            setEstadoCarga();
            
            try {
                if (paradaActiva.red === 'TMB') {
                    const url = `https://api.tmb.cat/v1/ibus/stops/${paradaActiva.codigo}?app_id=${APP_ID}&app_key=${APP_KEY}`;
                    const res = await fetch(url);
                    const datos = await res.json();
                    const buses = datos.data?.ibus.filter(b => b.line.toUpperCase() === paradaActiva.linea) || [];
                    procesarResultados(buses[0]?.["t-in-min"], buses[1]?.["t-in-min"]);
                } else {
                    const res = await fetch(`https://mi-bus.onrender.com/api/amb?parada=${paradaActiva.codigo}`);
                    const datos = await res.json();
                    if (datos.status === "ok") {
                        const buses = datos.buses.filter(b => b.linea.toUpperCase().includes(paradaActiva.linea));
                        procesarResultados(buses[0]?.minutos, buses[1]?.minutos);
                    } else throw new Error("AMB Error");
                }
                document.getElementById('detalle-info').innerText = "Servidor: Online ✅";
            } catch (e) {
                document.getElementById('detalle-info').innerText = "⚠️ Error de conexión";
                procesarResultados(null, null);
            }
        }

        async function forzarActualizacion() {
            const btn = document.getElementById('btn-actualizar');
            const original = btn.innerText;
            btn.innerText = "SINCRONIZANDO..."; btn.disabled = true;
            await buscarDatosBus();
            setTimeout(() => { btn.innerText = original; btn.disabled = false; }, 800);
        }

        async function compartirApp() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Mi Bus - Synthwave Edition',
                        text: '¡Mira esta App para ver los tiempos del autobús en tiempo real!',
                        url: window.location.href 
                    });
                } catch (error) {
                    console.log('Compartir cancelado');
                }
            } else {
                alert('Copia este enlace para compartir la app:\n' + window.location.href);
            }
        }

        // FONDO CANVAS NEÓN
        function crearFondo() {
            const viejoFondo = document.getElementById('fondo-textos');
            if (viejoFondo) viejoFondo.remove();

            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.zIndex = '-2';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let w, h;

            function ajustarTamaño() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', ajustarTamaño);
            ajustarTamaño();

            const colores = [
                '#FF00FF', '#00FFFF', '#FFFF00', '#00FF00', 
                '#8A2BE2', '#FF69B4', '#7FFFD4', '#FF4500' 
            ];
            const lineas = [];

            for(let i = 0; i < 10; i++) {
                lineas.push(crearRuta());
            }

            function crearRuta() {
                return {
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5 + 0.5), 
                    vy: 0, 
                    color: colores[Math.floor(Math.random() * colores.length)],
                    grosor: Math.random() * 3 + 1.5,
                    trazos: [],
                    distanciaHastaGiro: Math.random() * 150 + 50
                };
            }

            function animarMapa() {
                ctx.fillStyle = 'rgba(2, 6, 23, 0.08)'; 
                ctx.fillRect(0, 0, w, h);

                lineas.forEach(l => {
                    l.trazos.push({x: l.x, y: l.y});
                    if(l.trazos.length > 40) l.trazos.shift(); 

                    l.x += l.vx;
                    l.y += l.vy;

                    l.distanciaHastaGiro--;
                    if(l.distanciaHastaGiro <= 0) {
                        if(l.vx !== 0) { 
                            l.vy = (Math.random() > 0.5 ? 1 : -1) * Math.abs(l.vx); 
                            l.vx = 0; 
                        } else { 
                            l.vx = (Math.random() > 0.5 ? 1 : -1) * Math.abs(l.vy); 
                            l.vy = 0; 
                        }
                        l.distanciaHastaGiro = Math.random() * 200 + 50;
                    }

                    if(l.x < 0) l.x = w; if(l.x > w) l.x = 0;
                    if(l.y < 0) l.y = h; if(l.y > h) l.y = 0;

                    ctx.beginPath();
                    ctx.strokeStyle = l.color;
                    ctx.lineWidth = l.grosor;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    if(l.trazos.length > 0) {
                        ctx.moveTo(l.trazos[0].x, l.trazos[0].y);
                        for(let i = 1; i < l.trazos.length; i++) {
                            ctx.lineTo(l.trazos[i].x, l.trazos[i].y);
                        }
                        ctx.stroke();
                    }
                });
                requestAnimationFrame(animarMapa);
            }
            animarMapa();
        }

        // RELOJ GLOBAL
        function actualizarReloj() {
            const ahora = new Date();
            const horas = String(ahora.getHours()).padStart(2, '0');
            const minutos = String(ahora.getMinutes()).padStart(2, '0');
            const segundos = String(ahora.getSeconds()).padStart(2, '0');
            const relojEl = document.getElementById('reloj');
            if(relojEl) relojEl.innerText = `${horas}:${minutos}:${segundos}`;
        }
        
        // SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('PWA Lista')).catch(err => console.error('PWA Error', err));
            });
        }

        window.onload = () => {
            renderizarMenu();
            crearFondo();
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
        };
    </script>
</body>
</html>
