<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bus</title>
    <style>
        /* FONDO Y ANIMACIONES BASE */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ffffff;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #1e293b);
            background-size: 400% 400%;
            animation: auroraBackground 20s ease infinite;
            overflow: hidden;
        }

        @keyframes auroraBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fondo-textos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .mensaje-flotante {
            position: absolute;
            white-space: nowrap;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            color: rgba(255, 255, 255, 0.03); 
            user-select: none;
            animation: moverTexto linear infinite;
        }

        @keyframes moverTexto {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* ESTRUCTURA DEL DASHBOARD */
        .reloj-global {
            font-size: 2.5em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-family: monospace;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
        }

        .contenedor-tarjetas {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        /* TARJETAS */
        .tarjeta {
            background-color: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .parada {
            font-size: 1.1em;
            color: #b3b3b3;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .bloque-bus {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }
        .bloque-bus:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        /* DISEÑO DE LÍNEAS */
        .linea {
            font-size: 2.2em;
            font-weight: bold;
            color: #ffffff;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .linea-tmb { background-color: #2b70f0; box-shadow: 0 4px 15px rgba(43, 112, 240, 0.4); } /* COLOR V5 */
        .linea-amb { background-color: #ff5100; box-shadow: 0 4px 15px rgba(230, 126, 57, 0.425); } /* COLOR X30 */

        .tiempo {
            font-size: 3em;
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 5px;
            min-height: 1.2em;
            line-height: 1;
        }

        .minutos-texto {
            font-size: 0.3em;
            color: #888;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* BARRA Y PARPADEO */
        .progreso-container {
            width: 100%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progreso-barra {
            height: 100%;
            width: 0%;
            background-color: #4caf50;
            transition: width 1s ease-in-out, background-color 0.5s;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .alerta-roja { animation: parpadeo 1s ease-in-out infinite; }

        .proximo {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }

        /* BOTONES */
        .panel-botones {
            margin-top: 30px;
            z-index: 10;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            background-color: #2b70f0; 
            border-color: #2b70f0;
            transform: translateY(-2px);
        }

        @keyframes arcoiris {
            0% { color: #ff5252; }
            33% { color: #ffeb3b; }
            66% { color: #4caf50; }
            100% { color: #ff5252; }
        }
        .modo-ahora {
            animation: arcoiris 1.5s linear infinite;
            text-shadow: 0 0 15px currentColor;
        }
    </style>
</head>
<body>

    <div id="fondo-textos" class="fondo-textos"></div>
    <div id="reloj" class="reloj-global">00:00:00</div>

    <div class="contenedor-tarjetas">
        
        <div class="tarjeta">
            <div class="parada">📍 C. Bell-lloc - Berlín (3521)</div>
            
            <div class="bloque-bus">
                <div class="linea linea-tmb">V5</div>
                <div class="tiempo" id="tiempo-v5">--</div>
                <div class="progreso-container">
                    <div id="barra-v5" class="progreso-barra"></div>
                </div>
                <div class="proximo" id="siguiente-v5">Consultando TMB...</div>
            </div>
        </div>

        <div class="tarjeta">
            <div class="parada">📍 Pl. Reina Maria Cristina (237)</div>
            
            <div class="bloque-bus">
                <div class="linea linea-amb">X30</div>
                <div class="tiempo" id="tiempo-x30">--</div>
                <div class="progreso-container">
                    <div id="barra-x30" class="progreso-barra"></div>
                </div>
                <div class="proximo" id="siguiente-x30">Conectando a red AMB...</div>
            </div>
            
            <div class="proximo" id="info-amb" style="font-size: 0.8em; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;"></div>
        </div>

    </div>

    <div class="panel-botones">
        <button onclick="actualizarTodaLaRed()">Actualizar Red</button>
    </div>

    <script>
        // CONFIGURACIÓN TMB
        const APP_ID = "05f36d2d"; 
        const APP_KEY = "7337db37d02d34777f38d728ce1c1903"; 
        const PARADA_TMB = "3521"; 

        // CONFIGURACIÓN AMB
        const PARADA_AMB = "237"; 

        // --- FUNCIÓN MAESTRA VISUAL ---
        function actualizarInterfazBus(minutos, idTiempo, idBarra) {
            const tiempoEl = document.getElementById(idTiempo);
            const barraEl = document.getElementById(idBarra);

            if (minutos === null || minutos === undefined) {
                tiempoEl.innerHTML = "--";
                barraEl.style.width = "0%";
                barraEl.classList.remove("alerta-roja");
                return;
            }

            let porcentaje = Math.max(0, 100 - (minutos * 5)); 
            barraEl.style.width = porcentaje + "%";
            
            if (minutos <= 3) {
                barraEl.style.backgroundColor = "#ff5252"; 
                barraEl.classList.add("alerta-roja"); 
            } else if (minutos <= 8) {
                barraEl.style.backgroundColor = "#ffa726"; 
                barraEl.classList.remove("alerta-roja"); 
            } else {
                barraEl.style.backgroundColor = "#4caf50"; 
                barraEl.classList.remove("alerta-roja"); 
            }

            if (minutos === 0) {
                tiempoEl.innerHTML = "¡Ahora!";
                tiempoEl.classList.add("modo-ahora");
            } else {
                tiempoEl.innerHTML = minutos + '<span class="minutos-texto">minutos</span>';
                tiempoEl.classList.remove("modo-ahora");
            }
        }

        // --- 1. CONEXIÓN TMB (V5) ---
        async function obtenerTMB() {
            try {
                const url = `https://api.tmb.cat/v1/ibus/stops/${PARADA_TMB}?app_id=${APP_ID}&app_key=${APP_KEY}`;
                const respuesta = await fetch(url);
                const datos = await respuesta.json();

                if (datos.data && datos.data.ibus) {
                    const misBuses = datos.data.ibus.filter(bus => bus.line === "V5");
                    
                    if (misBuses.length > 0) {
                        actualizarInterfazBus(misBuses[0]["t-in-min"], 'tiempo-v5', 'barra-v5');
                        document.getElementById('siguiente-v5').innerHTML = misBuses.length > 1 
                            ? "Siguiente bus en " + misBuses[1]["t-in-min"] + " min" 
                            : "Solo un bus en trayecto";
                    } else {
                        actualizarInterfazBus(null, 'tiempo-v5', 'barra-v5');
                        document.getElementById('siguiente-v5').innerHTML = "Sin buses V5";
                    }
                }
            } catch (e) {
                document.getElementById('siguiente-v5').innerHTML = "Error de conexión TMB";
            }
        }

        // --- 2. CONEXIÓN AMB (Solo X30) ---
       async function obtenerAMB() {
            try {
                const respuesta = await fetch("https://mi-bus.onrender.com/api/amb");
                const datos = await respuesta.json();

                if (datos.status === "ok") {
                    const buses = datos.buses;
                    
                    // Buscamos todas las apariciones de la X30
                    const busesX30 = buses.filter(b => b.linea.includes("X30"));
                    
                    if (busesX30.length > 0) {
                        actualizarInterfazBus(busesX30[0].minutos, 'tiempo-x30', 'barra-x30');
                        // ¡Tu lógica aplicada a la X30!
                        document.getElementById('siguiente-x30').innerHTML = busesX30.length > 1 
                            ? "Siguiente bus en " + busesX30[1].minutos + " min" 
                            : "Solo un bus en trayecto";
                    } else {
                        actualizarInterfazBus(null, 'tiempo-x30', 'barra-x30');
                        document.getElementById('siguiente-x30').innerHTML = "Sin buses X30";
                    }
                    
                    document.getElementById('info-amb').innerHTML = "Conectado al servidor ✅";
                } else {
                    throw new Error(datos.message);
                }
            } catch (e) {
                console.error("Error del servidor Python:", e);
                actualizarInterfazBus(null, 'tiempo-x30', 'barra-x30');
                document.getElementById('siguiente-x30').innerHTML = "Buscando satélites...";
                document.getElementById('info-amb').innerHTML = "⚠️ Backend Python apagado";
            }
        }

        // FUNCIONES GLOBALES
        function actualizarTodaLaRed() {
            document.getElementById('siguiente-v5').innerHTML = "Actualizando...";
            document.getElementById('siguiente-x30').innerHTML = "Actualizando...";
            obtenerTMB();
            obtenerAMB();
        }

        function crearFondo() {
            const fondo = document.getElementById('fondo-textos');
            fondo.innerHTML = ''; // Limpiamos por si acaso
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.className = 'mensaje-flotante';
                span.innerText = 'MI BUS MI BUS'.repeat(4);
                span.style.fontSize = (Math.random() * 4 + 1) + 'em';
                span.style.top = (Math.random() * 100) + 'vh';
                span.style.animationDuration = (Math.random() * 30 + 20) + 's';
                span.style.animationDelay = (Math.random() * -40) + 's';
                fondo.appendChild(span);
            }
        }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').textContent = ahora.toLocaleTimeString();
        }

        window.onload = function() {
            crearFondo();
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
            
            actualizarTodaLaRed();
            setInterval(actualizarTodaLaRed, 30000); 
        };

    </script>
</body>
</html>
